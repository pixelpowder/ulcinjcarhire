<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Book</title>
  <meta name="color-scheme" content="light only" />
  <style>
    :root, html { color-scheme: light only; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #fff; color: #333; min-height: 100%; }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #fff !important; color: #333 !important; }
    }
    /* Hide widget promotional sections */
    .featuring-cool-cars,
    .highlight-container { display: none !important; height: 0 !important; overflow: hidden !important; visibility: hidden !important; }
    /* When LocalRent opens any modal it adds .mrc-lock-scroll or .mrc-no-scroll
       to body. Lock body overflow — html overflow is locked via JS below
       since :has() support varies. */
    body.mrc-lock-scroll,
    body.mrc-no-scroll {
      overflow: hidden !important;
      height: 100% !important;
    }
    /* Make sure children of action bar (Reset link + View cars button) are
       visible at narrow widths — LocalRent sometimes hides Reset on mobile. */
    .search_buttons > *,
    [class*="search_buttons"] > * {
      display: inline-flex !important;
      visibility: visible !important;
    }
    /* Prevent horizontal scroll on the iframe — clip only at root level
       (html, body) so no element can extend the page past viewport. */
    @media (max-width: 768px) {
      html, body {
        overflow-x: hidden !important;
        max-width: 100vw !important;
      }
    }
    /* Hide scrollbar visually while keeping scroll functionality. The
       vertical scrollbar was eating ~12px of width on the right, making
       content look off-center (asymmetric left/right spacing). */
    html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    /* Hard CSS overrides for LocalRent's teal-green that leaks through
       external stylesheets (the recolour script only catches <style> tags).
       Replace any green border/color/background with our navy. */
    :root, html, body {
      --primary: rgb(27, 58, 92) !important;
      --primary-color: rgb(27, 58, 92) !important;
      --primary-text: rgb(27, 58, 92) !important;
      --accent: rgb(27, 58, 92) !important;
      --accent-color: rgb(27, 58, 92) !important;
      --green: rgb(27, 58, 92) !important;
      --color-primary: rgb(27, 58, 92) !important;
      --color-accent: rgb(27, 58, 92) !important;
      --localrent-primary: rgb(27, 58, 92) !important;
      --localrent-green: rgb(27, 58, 92) !important;
      --teal: rgb(27, 58, 92) !important;
      --brand: rgb(27, 58, 92) !important;
    }
    .link-dashed,
    .booking__show-all,
    .gps-journal-link,
    .booking__show-map,
    .vue-slider-dot-handle,
    [class*="link-dashed"],
    .vehicle-card-insurance__price,
    [class*="vehicle-card-insurance__price"],
    .vehicle-card-info__no-credit-card,
    [class*="no-credit-card"] {
      border-color: rgb(27, 58, 92) !important;
      color: rgb(27, 58, 92) !important;
    }
    /* Search bar outline pills (date range + Filters button).
       Nuke ALL outlines/box-shadows/borders regardless of colour so no
       green focus ring or wrapper outline can leak through, no matter
       which class LocalRent applies it to. */
    .search-cigarette,
    .search-cigarette__wrap,
    .search-cigarette__row,
    .search-cigarette__calendar,
    .search-cigarette__calendar:hover,
    .search-cigarette__calendar:focus,
    .search-cigarette__calendar:focus-visible,
    .search-cigarette__calendar:focus-within,
    .search-cigarette__place-time,
    .search-cigarette__place-time:focus,
    .search-cigarette__place-time:focus-visible,
    .search-cigarette__place-time:focus-within,
    .search-filters,
    .search-filters:focus,
    .search-filters:focus-visible,
    .search-filters:focus-within,
    .date-range,
    [class*="search-cigarette"],
    [class*="search-filters"],
    [class*="date-range"] {
      outline: none !important;
      outline-color: transparent !important;
      box-shadow: none !important;
      border-color: rgba(255, 255, 255, 0.12) !important;
    }
    .search-filters__wrap,
    .search-filters__wrap:hover,
    .search-filters__wrap:focus {
      background: rgb(5, 32, 60) !important;
      border-color: rgba(255, 255, 255, 0.2) !important;
      color: #fff !important;
    }
    /* Match any element with green inline style */
    [style*="rgb(25, 168, 128)"],
    [style*="rgb(39, 199, 154)"],
    [style*="#19a880"],
    [style*="#27c79a"] {
      border-color: rgb(27, 58, 92) !important;
      color: rgb(27, 58, 92) !important;
      background-color: rgb(27, 58, 92) !important;
    }
    /* "Free of charge" green text inside insurance card */
    .insurance-card__price-free,
    [class*="price-free"],
    [class*="free-of-charge"],
    .vehicle-card-insurance__price,
    [class*="vehicle-card-insurance__price"] {
      color: rgb(27, 58, 92) !important;
      border-color: rgb(27, 58, 92) !important;
    }
    /* Filter modal header — same white "Filters | X" treatment on all
       screen sizes (mobile + desktop) so the modal has a consistent header. */
    body.mrc-lock-scroll .search-filters__wrap {
      background: #fff !important;
      color: rgb(5, 32, 60) !important;
      border-bottom: 1px solid #e7e8ea !important;
    }
    /* Mobile: pin header to viewport top, float action bar at bottom
       (LocalRent's mobile pattern). Desktop uses native centred panel. */
    @media (max-width: 768px) {
      body.mrc-lock-scroll .search-filters__wrap {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 2003 !important;
        height: 54px !important;
        min-height: 54px !important;
        max-height: 54px !important;
        padding: 0 0 0 16px !important;
      }
      body.mrc-lock-scroll .search-filters__footer,
      body.mrc-lock-scroll [class*="search-filters__footer"],
      body.mrc-lock-scroll .search_buttons,
      body.mrc-lock-scroll [class*="search_buttons"] {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        top: auto !important;
        z-index: 2002 !important;
        background: #fff !important;
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)) !important;
        box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.08) !important;
        display: flex !important;
        gap: 12px !important;
        align-items: center !important;
        justify-content: space-between !important;
      }
      body.mrc-lock-scroll .view-cars-btn {
        position: static !important;
        flex: 1 1 auto !important;
        top: auto !important;
        bottom: auto !important;
        left: auto !important;
        right: auto !important;
      }
      body.mrc-lock-scroll .settings__popup-inner {
        /* 54px header overlap from top of modal panel which sits at popup-outer
           top:54 — content starts directly below header at 0 + small breath. */
        padding: 8px 14px 96px !important;
      }
    }
  </style>
  <script>
    // Recolour widget greens to site navy/blue.
    const BLUE  = '#1B3A5C';
    const replacements = [
      // LocalRent's actual primary teal-green is rgb(25, 168, 128) = #19a880
      // and accent rgb(39, 199, 154) = #27c79a
      [/#19a880/gi, BLUE],
      [/#27c79a/gi, BLUE],
      [/rgb\(25,\s*168,\s*128\)/gi, 'rgb(27,58,92)'],
      [/rgb\(39,\s*199,\s*154\)/gi, 'rgb(27,58,92)'],
      [/rgba\(25,\s*168,\s*128,/gi, 'rgba(27,58,92,'],
      [/rgba\(39,\s*199,\s*154,/gi, 'rgba(27,58,92,'],
      // "Free of charge" green (#0dad36 / rgb(13, 173, 54))
      [/#0dad36/gi, BLUE],
      [/rgb\(13,\s*173,\s*54\)/gi, 'rgb(27,58,92)'],
      [/rgba\(13,\s*173,\s*54,/gi, 'rgba(27,58,92,'],
      // Lighter teal #82dbc2 / rgb(130, 219, 194) on no-credit-card pill
      [/#82dbc2/gi, BLUE],
      [/rgb\(130,\s*219,\s*194\)/gi, 'rgb(27,58,92)'],
      [/rgba\(130,\s*219,\s*194,/gi, 'rgba(27,58,92,'],
      // Older/alt LocalRent greens (kept defensively)
      [/#39b54a/gi, BLUE],
      [/#4caf50/gi, BLUE],
      [/#00a651/gi, BLUE],
      [/#2ecc71/gi, BLUE],
      [/#27ae60/gi, BLUE],
      [/rgb\(57,\s*181,\s*74\)/gi,  'rgb(27,58,92)'],
      [/rgb\(76,\s*175,\s*80\)/gi,  'rgb(27,58,92)'],
      [/rgb\(0,\s*166,\s*81\)/gi,   'rgb(27,58,92)'],
      [/rgba\(57,\s*181,\s*74,/gi,  'rgba(27,58,92,'],
      [/rgba\(76,\s*175,\s*80,/gi,  'rgba(27,58,92,'],
    ];
    function recolour(css) {
      let out = css;
      for (const [from, to] of replacements) out = out.replace(from, to);
      return out;
    }
    function patchStyle(el) {
      if (el._mrcPatched) return;
      el._mrcPatched = true;
      const original = el.textContent;
      const patched  = recolour(original);
      if (patched !== original) el.textContent = patched;
    }
    document.querySelectorAll('style').forEach(patchStyle);
    new MutationObserver(mutations => {
      for (const m of mutations) {
        for (const node of m.addedNodes) {
          if (node.nodeName === 'STYLE') patchStyle(node);
          if (node.querySelectorAll) node.querySelectorAll('style').forEach(patchStyle);
        }
      }
    }).observe(document.documentElement, { childList: true, subtree: true });

    // Lock html overflow when LocalRent opens any modal so the iframe-element
    // scrollbar disappears. Direct JS for reliability across browsers.
    new MutationObserver(() => {
      const locked = document.body.classList.contains('mrc-lock-scroll')
                  || document.body.classList.contains('mrc-no-scroll');
      document.documentElement.style.overflow = locked ? 'hidden' : '';
      document.documentElement.style.height   = locked ? '100%'   : '';
    }).observe(document.documentElement, {
      subtree: true, attributes: true, attributeFilter: ['class']
    });

    // Colour-detecting nuke for the green ring. Targeted-class CSS keeps
    // losing because LocalRent has many wrapper variants and some greens
    // come through external stylesheets that the recolour script doesn't
    // touch. Instead: walk every element, read its computed styles, and if
    // any border/outline/box-shadow colour is green-ish, force inline
    // overrides (inline !important always beats external CSS).
    const NAVY_BORDER = 'rgba(255, 255, 255, 0.12)';
    function isGreenish(color) {
      if (!color) return false;
      const m = color.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      if (!m) return false;
      const r = +m[1], g = +m[2], b = +m[3];
      // Skip black / white / grey / fully-transparent.
      if (r === g && g === b) return false;
      if (color.includes('rgba') && /,\s*0\s*\)$/.test(color)) return false;
      // Green dominant: g clearly larger than r and at least competitive
      // with b. Catches LocalRent's teal-greens (25,168,128), (39,199,154),
      // (13,173,54), (130,219,194), and similar.
      return g > 100 && g > r + 20 && g >= b - 40;
    }
    function nukeIfGreen(el) {
      if (!el || !el.style || el.nodeType !== 1) return;
      // Idempotency guard: once we've nuked this element, don't re-process.
      // Tooltip glitch fix — without this, hovering the "?" help triggers
      // caused our sweep to write inline styles every frame as the tooltip
      // animated, fighting its fade-in transition.
      if (el._mrcNuked) return;
      const cs = window.getComputedStyle(el);
      let touched = false;
      const borderGreen =
        isGreenish(cs.borderTopColor) || isGreenish(cs.borderRightColor) ||
        isGreenish(cs.borderBottomColor) || isGreenish(cs.borderLeftColor);
      if (borderGreen) {
        el.style.setProperty('border-color', NAVY_BORDER, 'important');
        touched = true;
      }
      if (isGreenish(cs.outlineColor)) {
        el.style.setProperty('outline', 'none', 'important');
        el.style.setProperty('outline-color', 'transparent', 'important');
        touched = true;
      }
      if (cs.boxShadow && cs.boxShadow !== 'none') {
        const colors = cs.boxShadow.match(/rgba?\([^)]+\)/g) || [];
        if (colors.some(isGreenish)) {
          el.style.setProperty('box-shadow', 'none', 'important');
          touched = true;
        }
      }
      // Background-color: .search-cigarette__pinned uses #19a880 here.
      if (isGreenish(cs.backgroundColor)) {
        // Brand-filter chips (Mercedes/VW/etc) need a *light* replacement
        // so the dark logo on top still reads — using navy would give a
        // dark logo on a dark chip. Walk up looking for a "brand" parent.
        let bgReplace = 'rgb(5, 32, 60)';
        let p = el;
        for (let i = 0; i < 6 && p; i++) {
          const cn = typeof p.className === 'string' ? p.className
                    : (p.className && p.className.baseVal) || '';
          if (/brand/i.test(cn)) { bgReplace = '#f0f1f3'; break; }
          p = p.parentElement;
        }
        el.style.setProperty('background-color', bgReplace, 'important');
        touched = true;
      }
      if (touched) el._mrcNuked = true;
    }
    let sweepScheduled = false;
    function sweepGreen() {
      if (sweepScheduled) return;
      sweepScheduled = true;
      requestAnimationFrame(() => {
        sweepScheduled = false;
        document.querySelectorAll('*').forEach(nukeIfGreen);
      });
    }
    // JS-based pointer-events enforcer for the "?" tooltip triggers.
    // CSS-only kept losing — LocalRent uses Vue scoped styles ([data-v-XXX]
    // attribute selectors) which are higher specificity than our class
    // selectors. Inline !important via setProperty always wins.
    function fixTooltipHover() {
      document.querySelectorAll('.mrc-tooltip, .booking__info_btn, [class*="mrc-tooltip"], [class*="booking__info_btn"]').forEach(wrap => {
        if (wrap._mrcHover) return;
        wrap.style.setProperty('pointer-events', 'auto', 'important');
        wrap.style.setProperty('display', 'inline-block', 'important');
        wrap.querySelectorAll('svg, svg *').forEach(child => {
          child.style.setProperty('pointer-events', 'none', 'important');
        });
        wrap._mrcHover = true;
      });
    }
    // JS-based fill override for brand-chip svg paint. CSS rules on
    // .brand-filter__icon path/rect are losing to Vue's scoped variant
    // (.brand-filter__icon[data-v-XXX] path), so set inline !important
    // on each path/rect — that always wins regardless of specificity.
    function fixBrandIcons() {
      document.querySelectorAll('.brand-filter__icon, [class*="brand-filter__icon"]').forEach(svg => {
        svg.querySelectorAll('rect').forEach(r => {
          if (r._mrcBrandRect) return;
          // Only overwrite rects that originally had a fill — leave the
          // stroke-only border rects alone so the white outline stays.
          if (r.getAttribute('fill') && r.getAttribute('fill') !== 'none') {
            r.style.setProperty('fill', '#f0f1f3', 'important');
          }
          r._mrcBrandRect = true;
        });
        svg.querySelectorAll('path').forEach(p => {
          if (p._mrcBrandPath) return;
          p.style.setProperty('fill', '#353E4E', 'important');
          p.style.setProperty('fill-opacity', '0.85', 'important');
          p._mrcBrandPath = true;
        });
      });
    }
    sweepGreen();
    fixTooltipHover();
    fixBrandIcons();
    // Watch class changes and DOM additions only — NOT the 'style' attribute.
    // Our own inline-style writes are themselves attribute mutations; if we
    // observed them, every write would re-trigger the sweep, causing the
    // tooltip-glitch loop on hover.
    new MutationObserver(() => {
      sweepGreen();
      fixTooltipHover();
      fixBrandIcons();
    }).observe(document.documentElement, {
      childList: true, subtree: true, attributes: true,
      attributeFilter: ['class']
    });
  </script>
</head>
<body>
  <div id="localrent-widget"></div>
  <script>
    (function() {
      const _params = new URLSearchParams(window.location.search);
      const cityId = _params.get('city_id') || '9';
      const widgetLang = _params.get('lang') || 'en';
      const script = document.createElement('script');
      script.src = 'https://static.localrent.com/booking/v2/wl/app.js';
      script.async = true;
      script.setAttribute('data-mrc-wl',   'true');
      script.setAttribute('data-affiliate','14905');
      script.setAttribute('data-marker',   'kotorcarrental');
      script.setAttribute('data-country',  '133');
      script.setAttribute('data-city',     cityId);
      script.setAttribute('data-routing',  'on');
      script.setAttribute('data-zindex',   '100');
      script.setAttribute('data-locale',   widgetLang);
      const dateFrom = _params.get('date_from');
      const dateTo = _params.get('date_to');
      const timeFrom = _params.get('time_from') || '10:00';
      const timeTo = _params.get('time_to') || '10:00';
      if (dateFrom) {
        script.setAttribute('data-pickup-date', dateFrom);
        script.setAttribute('data-date-from', dateFrom);
        script.setAttribute('data-pickupdate', dateFrom);
        script.setAttribute('data-pickup_date', dateFrom);
        script.setAttribute('data-time-from', timeFrom);
      }
      if (dateTo) {
        script.setAttribute('data-dropoff-date', dateTo);
        script.setAttribute('data-date-to', dateTo);
        script.setAttribute('data-dropoffdate', dateTo);
        script.setAttribute('data-dropoff_date', dateTo);
        script.setAttribute('data-time-to', timeTo);
      }
      document.body.appendChild(script);

      // Inject dates into the widget's Vue store on init.
      if (dateFrom && dateTo) {
        var attempts = 0;
        var earlyPoll = setInterval(function() {
          attempts++;
          if (attempts > 200) { clearInterval(earlyPoll); return; }
          var vue = null;
          for (var el of document.querySelectorAll('*')) {
            if (el.__vue__ && el.__vue__.$store) { vue = el.__vue__; break; }
          }
          if (!vue) return;
          var store = vue.$store;
          var state = store.state;
          if (state.filtersDate) {
            state.filtersDate.pickupDate = dateFrom;
            state.filtersDate.dropoffDate = dateTo;
          }
          if (state.calendar) {
            state.calendar.defaultPickup = dateFrom;
            state.calendar.defaultDropoff = dateTo;
          }
          try { store.commit('setSelectedDates', true); } catch(e) {}
          try { store.commit('SET_FILTERS_DATE', { pickupDate: dateFrom, dropoffDate: dateTo }); } catch(e) {}
          try { store.commit('setFiltersDate', { pickupDate: dateFrom, dropoffDate: dateTo }); } catch(e) {}
          try { store.commit('filters/setDate', { pickupDate: dateFrom, dropoffDate: dateTo }); } catch(e) {}
          var calEl = document.querySelector('.search-cigarette__calendar');
          while (calEl) {
            var v = calEl.__vue__;
            if (v && v.$data && 'dates' in v.$data) {
              v.$set(v.$data, 'dates', [dateFrom, dateTo]);
              break;
            }
            calEl = calEl.parentElement;
          }
          try { store.dispatch('fetchCars'); } catch(e) {}
          try { store.dispatch('search/fetchCars'); } catch(e) {}
          if (attempts < 20) return;
          clearInterval(earlyPoll);
        }, 50);
      }
    })();
  </script>
  <script>
    // Inject brand overrides after widget CSS loads.
    const _p = new URLSearchParams(window.location.search);
    const hideSearch = _p.get('hide_search') === '1';
    const BRAND_CSS = `
      ${hideSearch ? '.search-cigarette, .search-cigarette__wrap, .search-filters, .search-filters__wrap { display: none !important; }' : ''}

         in a ~1180px container. Without this the iframe stretches its
         children edge-to-edge on wide viewports, which is why the search
         bar / car list / car detail look wider than LocalRent's own site. */

      .search-cigarette__inner,
      .search-filters,
      .search-filters__wrap,
      [class*="search-results"],
      [class*="vehicles-grid"],
      [class*="vehicle-list"],
      [class*="vehicle-card-detail"],

        max-width: 1180px !important;

        margin-right: auto !important;
      }
      .search-cigarette__city,

      body.mrc-lock-scroll .search-filters,

      .search-calendar,

      .date-range__date,
      .date-range__days,
      .date-range__dash,
      .search-cigarette__calendar .search-cigarette__trigger,
      .search-cigarette__calendar .search-cigarette__placeholder { color: rgb(5, 32, 60) !important; }
      .calendar-day.calendar-highlighted {
        background: rgba(27,58,92,0.12) !important;

      .product-sticker--low-deposit,
      [class*="low-deposit"] { background: rgb(27,58,92) !important; color: #fff !important; border-color: rgb(27,58,92) !important; }
      .button { background: rgb(27,58,92) !important; border-color: rgb(27,58,92) !important; color: #fff !important; }
      .button:hover { background: rgb(20,45,74) !important; }
      .embla__button { background: rgb(27,58,92) !important; border-color: rgb(27,58,92) !important; }
      .search__progress { background: rgb(27,58,92) !important; }
      .vehicle-card-info__badge { color: rgb(27,58,92) !important; }
      [class*="banner"], [class*="promo"], [class*="winter"], [class*="notification"],
      [class*="search-sticker"], [class*="sticker"],
      [class*="categor"], [class*="tag-list"], [class*="tags-row"],
      [class*="search-tag"], [class*="multi_tab"], [class*="multi-tab"],
      [class*="tab-list"], [class*="tabs-row"], [class*="advantage"],
      [class*="special"], [class*="perk"],
      [class*="badge-list"], [class*="badges-row"],
      .featuring-cool-cars, [class*="featuring"],
      [class*="top-pick"], [class*="top_pick"] { display: none !important; }
      /* Centre .booking + its column container only. DO NOT add margin:auto
         to .booking__column-left / __column-right — they're flex items in
         a row layout, and margin:auto on a flex item makes it claim all
         available space along the main axis. Combined with LocalRent's
         existing layout that produced .booking__column-left at 119975px
         wide (devtools-confirmed), making the slideshow + insurance cards
         + text all overflow the right edge at narrow viewports. */
      .booking,
      .booking__columns,
      [class*="booking__columns"] {
        margin-left: auto !important;
        margin-right: auto !important;
      }
      /* Allow long card-body text to wrap inside the card so it doesn't
         run off the right edge. Scoped to text-bearing card classes only —
         not .booking * (which would over-apply to flex containers). */
      [class*="insurance-card"],
      [class*="coverage-card"],
      [class*="package-card"],
      [class*="insurance-card"] *,
      [class*="coverage-card"] *,
      [class*="package-card"] * {
        overflow-wrap: anywhere !important;
        word-wrap: break-word !important;
      }
      /* Pull the vehicle-card-info badges (Cash deposit possible, No credit
         card) inside the card so they don't clip past the right edge. They
         sit absolute-positioned at top-right of the card; constrain right
         offset and allow wrap. */
      .vehicle-card-info__badges,
      [class*="vehicle-card-info__badges"],
      .vehicle-card-badges,
      [class*="vehicle-card-badges"] {
        right: 8px !important;
        max-width: calc(100% - 16px) !important;
        flex-wrap: wrap !important;
        white-space: normal !important;
      }
      .vehicle-card-info__badges > *,
      [class*="vehicle-card-info__badges"] > *,
      .vehicle-card-badges > *,
      [class*="vehicle-card-badges"] > * {
        max-width: 100% !important;
        white-space: normal !important;
      }
      /* Match the badge text + icons (Free cancelation / Unlimited mileage /
         No credit card etc.) to the Filters trigger colour — same muted
         white. currentColor on svg keeps the icon tracking the text. */
      .vehicle-card-badges,
      [class*="vehicle-card-badges"],
      .vehicle-card-info__badges,
      [class*="vehicle-card-info__badges"] {
        color: rgba(255, 255, 255, 0.7) !important;
      }
      .vehicle-card-badges *,
      [class*="vehicle-card-badges"] *,
      .vehicle-card-info__badges *,
      [class*="vehicle-card-info__badges"] * {
        color: rgba(255, 255, 255, 0.7) !important;
      }
      .vehicle-card-badges svg,
      [class*="vehicle-card-badges"] svg,
      .vehicle-card-info__badges svg,
      [class*="vehicle-card-info__badges"] svg {
        fill: currentColor !important;
        stroke: currentColor !important;
      }
      /* Help "?" triggers — devtools-confirmed classes: .mrc-tooltip wraps
         .booking__info_btn which holds a 24x24 svg with an r=8 circle. The
         circle covers only ~16px of the 24px box, so 4px around it doesn't
         catch hover. Push hover to the wrapper spans, kill it on the svg
         and its children so hover stays stable across the full hitbox. */
      .mrc-tooltip,
      .booking__info_btn,
      [class*="mrc-tooltip"],
      [class*="booking__info_btn"] {
        pointer-events: auto !important;
        display: inline-block !important;
      }
      .mrc-tooltip svg,
      .booking__info_btn svg,
      [class*="mrc-tooltip"] svg,
      [class*="booking__info_btn"] svg,
      .mrc-tooltip svg *,
      .booking__info_btn svg *,
      [class*="mrc-tooltip"] svg *,
      [class*="booking__info_btn"] svg * {
        pointer-events: none !important;
      }
      /* Filter-panel brand circles — devtools-confirmed class
         .brand-filter__icon. The SVG renders 3 overlapping ~21px circles
         with rects fill="#F2F1F1" (light grey bg) and brand-coloured
         logo paths (Mercedes #0066B1, VW #001E50, etc.) that cover most
         of each circle, making the chips read as "blue blobs". Override
         path fills to #353E4E (same as the class-chip car icons above)
         so all three brand logos read as uniform grey marks on light
         circles — matching the visual weight of Economy/Standard/SUV. */
      .brand-filter__icon rect,
      [class*="brand-filter__icon"] rect {
        fill: #f0f1f3 !important;
      }
      .brand-filter__icon path,
      [class*="brand-filter__icon"] path {
        fill: #353E4E !important;
        fill-opacity: 0.85 !important;
      }
      /* Release the ~331px minimum so the card can fit sub-320px viewports
         (paranoid responsive testing at 306px etc.). At ≥ 360px viewports
         these rules are no-ops because the card's natural width is already
         above 0 — they only kick in when the parent width is the binding
         constraint. Both the grid item's intrinsic min-content floor AND
         the grid track minmax() floor need overriding. */
      .vehicle-card,
      [class*="vehicle-card"],
      .vehicles-grid__row,
      [class*="vehicles-grid__row"],
      .vehicles-grid__virtual-container,
      [class*="vehicles-grid__virtual-container"] {
        min-width: 0 !important;
      }
      .vehicles-grid,
      [class*="vehicles-grid"] {
        grid-template-columns: minmax(0, 1fr) !important;
      }
    `;
    const p = new URLSearchParams(window.location.search);
    const placeName = p.get('place');
    if (placeName) {
      var locPoll = setInterval(function() {
        var vue = null;
        for (var el of document.querySelectorAll('*')) {
          if (el.__vue__ && el.__vue__.$store) { vue = el.__vue__; break; }
        }
        if (!vue || !vue.$store.state.carsCountFinished) return;
        clearInterval(locPoll);
        try { vue.$store.commit('setPickupCityName', placeName); } catch(e) {}
        try { vue.$store.commit('setDropoffCityName', placeName); } catch(e) {}
      }, 200);
    }
    let injected = false;
    function injectBrandStyles() {
      if (injected) return;
      if (!document.querySelector('.search-cigarette') && !document.querySelector('.featuring-cool-cars') && !document.querySelector('[class*="vehicle"]')) return;
      injected = true;
      const style = document.createElement('style');
      style.textContent = BRAND_CSS;
      document.head.appendChild(style);
    }
    new MutationObserver(injectBrandStyles)
      .observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(injectBrandStyles, 1000);
    setTimeout(injectBrandStyles, 2000);
    setTimeout(injectBrandStyles, 3000);
  </script>
</body>
</html>
